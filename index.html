<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numerical Methods Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 border-b pb-2">Numerical Methods Calculator</h1>
        
        <div class="flex space-x-4 mb-6">
            <button onclick="switchTab('trapezoidal')" class="tab-btn bg-blue-600 text-white px-4 py-2 rounded">Trapezoidal Rule</button>
            <button onclick="switchTab('euler')" class="tab-btn bg-gray-200 text-gray-700 px-4 py-2 rounded">Euler's Method</button>
            <button onclick="switchTab('gauss')" class="tab-btn bg-gray-200 text-gray-700 px-4 py-2 rounded">Gauss-Seidel</button>
        </div>

        <div id="trapezoidal-ui" class="method-ui">
            <h2 class="text-xl font-semibold mb-4 text-blue-600">Integrate f(x) = x²</h2>
            <div class="grid grid-cols-3 gap-4 mb-4">
                <input id="trap-a" type="number" placeholder="Lower limit (a)" class="border p-2 rounded" value="0">
                <input id="trap-b" type="number" placeholder="Upper limit (b)" class="border p-2 rounded" value="2">
                <input id="trap-n" type="number" placeholder="Intervals (n)" class="border p-2 rounded" value="10">
            </div>
            <button onclick="calcTrapezoidal()" class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600">Calculate</button>
        </div>

        <div id="euler-ui" class="method-ui hidden">
            <h2 class="text-xl font-semibold mb-4 text-blue-600">Solve dy/dx = x + y</h2>
            <div class="grid grid-cols-4 gap-4 mb-4">
                <input id="euler-x0" type="number" placeholder="Initial x" class="border p-2 rounded" value="0">
                <input id="euler-y0" type="number" placeholder="Initial y" class="border p-2 rounded" value="1">
                <input id="euler-h" type="number" step="0.1" placeholder="Step size (h)" class="border p-2 rounded" value="0.1">
                <input id="euler-target" type="number" placeholder="Target x" class="border p-2 rounded" value="1">
            </div>
            <button onclick="calcEuler()" class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600">Calculate</button>
        </div>

        <div id="gauss-ui" class="method-ui hidden">
            <h2 class="text-xl font-semibold mb-4 text-blue-600">2x2 System (Ax = B)</h2>
            <p class="text-sm text-gray-500 mb-2">Equation: a11x + a12y = b1 | a21x + a22y = b2</p>
            <div class="grid grid-cols-3 gap-2 mb-4">
                <input id="g-a11" type="number" placeholder="a11" class="border p-2 rounded" value="4">
                <input id="g-a12" type="number" placeholder="a12" class="border p-2 rounded" value="1">
                <input id="g-b1" type="number" placeholder="b1" class="border p-2 rounded" value="7">
                <input id="g-a21" type="number" placeholder="a21" class="border p-2 rounded" value="1">
                <input id="g-a22" type="number" placeholder="a22" class="border p-2 rounded" value="3">
                <input id="g-b2" type="number" placeholder="b2" class="border p-2 rounded" value="8">
            </div>
            <button onclick="calcGauss()" class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600">Solve (10 Iterations)</button>
        </div>

        <div id="result-box" class="mt-8 p-4 bg-gray-50 rounded border hidden">
            <h3 class="font-bold text-gray-700">Result:</h3>
            <p id="result-text" class="text-2xl text-indigo-700 font-mono mt-2"></p>
        </div>
    </div>

    <script>
        // Tab Management
        function switchTab(method) {
            document.querySelectorAll('.method-ui').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.replace('bg-blue-600', 'bg-gray-200');
                btn.classList.replace('text-white', 'text-gray-700');
            });
            
            document.getElementById(method + '-ui').classList.remove('hidden');
            event.target.classList.replace('bg-gray-200', 'bg-blue-600');
            event.target.classList.replace('text-gray-700', 'text-white');
            document.getElementById('result-box').classList.add('hidden');
        }

        function showResult(val) {
            const box = document.getElementById('result-box');
            const text = document.getElementById('result-text');
            box.classList.remove('hidden');
            text.innerText = val;
        }

        // 1. Trapezoidal Rule (Integral of x^2)
        function calcTrapezoidal() {
            const f = (x) => x * x;
            const a = parseFloat(document.getElementById('trap-a').value);
            const b = parseFloat(document.getElementById('trap-b').value);
            const n = parseInt(document.getElementById('trap-n').value);
            
            const h = (b - a) / n;
            let sum = f(a) + f(b);
            
            for (let i = 1; i < n; i++) {
                sum += 2 * f(a + i * h);
            }
            
            const result = (h / 2) * sum;
            showResult(result.toFixed(5));
        }

        // 2. Euler's Method (dy/dx = x + y)
        function calcEuler() {
            const f = (x, y) => x + y;
            let x = parseFloat(document.getElementById('euler-x0').value);
            let y = parseFloat(document.getElementById('euler-y0').value);
            const h = parseFloat(document.getElementById('euler-h').value);
            const target = parseFloat(document.getElementById('euler-target').value);

            while (x < target) {
                y = y + h * f(x, y);
                x = x + h;
            }
            showResult(`y(${target}) ≈ ${y.toFixed(5)}`);
        }

        // 3. Gauss-Seidel Method (2x2 System)
        function calcGauss() {
            let a11 = parseFloat(document.getElementById('g-a11').value);
            let a12 = parseFloat(document.getElementById('g-a12').value);
            let b1 = parseFloat(document.getElementById('g-b1').value);
            let a21 = parseFloat(document.getElementById('g-a21').value);
            let a22 = parseFloat(document.getElementById('g-a22').value);
            let b2 = parseFloat(document.getElementById('g-b2').value);

            let x = 0, y = 0; // Initial guesses

            for (let i = 0; i < 10; i++) {
                x = (b1 - a12 * y) / a11;
                y = (b2 - a21 * x) / a22;
            }
            showResult(`x ≈ ${x.toFixed(4)}, y ≈ ${y.toFixed(4)}`);
        }
    </script>
</body>
</html>
